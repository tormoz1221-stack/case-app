<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кейс с голдой</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 22px;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .case-box {
            background: linear-gradient(180deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            max-width: 300px;
            border: 2px solid #3a3a5a;
            margin-bottom: 15px;
        }

        .case-icon {
            font-size: 50px;
            text-align: center;
            margin-bottom: 5px;
        }

        .case-title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Барабан */
        .drum-container {
            position: relative;
            width: 100%;
            height: 100px;
            background: #0d0d1a;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #4a4a6a;
        }

        /* Центральная линия */
        .center-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            transform: translateY(-50%);
            z-index: 10;
            box-shadow: 0 0 15px #ffd700;
        }

        /* Лента с призами */
        .drum {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            will-change: transform;
        }

        .prize-item {
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            border-bottom: 1px solid #2a2a4a;
        }

        .prize-item.gold { 
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%); 
            color: #1a1a2e;
        }
        .prize-item.silver { 
            background: linear-gradient(135deg, #e0e0e0 0%, #b0b0b0 100%); 
            color: #1a1a2e;
        }
        .prize-item.bronze { 
            background: linear-gradient(135deg, #cd7f32 0%, #b87333 100%); 
            color: #1a1a2e;
        }
        .prize-item.common { 
            background: linear-gradient(135deg, #4a4a6a 0%, #3a3a5a 100%);
        }

        /* Градиенты по краям */
        .drum-container::before,
        .drum-container::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 25px;
            z-index: 5;
            pointer-events: none;
        }

        .drum-container::before {
            top: 0;
            background: linear-gradient(to bottom, #0d0d1a 60%, transparent 100%);
        }

        .drum-container::after {
            bottom: 0;
            background: linear-gradient(to top, #0d0d1a 60%, transparent 100%);
        }

        .open-btn {
            background: linear-gradient(180deg, #ffd700 0%, #ffaa00 100%);
            border: none;
            border-radius: 12px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .open-btn:disabled {
            background: #4a4a6a;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Результат */
        .result-box {
            display: none;
            text-align: center;
            margin-top: 15px;
            padding: 20px;
            background: linear-gradient(180deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 15px;
            border: 2px solid #3a3a5a;
            width: 100%;
            max-width: 300px;
        }

        .result-box.show {
            display: block;
        }

        .result-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .result-amount {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 10px 0;
        }

        .result-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .result-price {
            font-size: 20px;
            color: #4ade80;
            margin-bottom: 15px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-save {
            background: linear-gradient(180deg, #6366f1 0%, #4f46e5 100%);
            color: white;
        }

        .btn-sell {
            background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }

        .chance-text {
            margin-top: 15px;
            text-align: center;
            color: #666;
            font-size: 11px;
            max-width: 300px;
        }

        .glow {
            animation: glow 0.5s ease-in-out;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px #ffd700; }
            50% { box-shadow: 0 0 30px #ffd700, 0 0 50px #ffaa00; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 Кейс с голдой</h1>
    </div>

    <div class="case-box">
        <div class="case-icon">🎁</div>
        <div class="case-title">Кейс с голдой</div>
        
        <div class="drum-container">
            <div class="center-line"></div>
            <div class="drum" id="drum"></div>
        </div>
    </div>

    <button class="open-btn" id="openBtn" onclick="spin()">🎰 Открыть</button>

    <div class="result-box" id="resultBox">
        <div class="result-title">ВЫПАЛО</div>
        <div class="result-amount" id="resultAmount">0</div>
        <div class="result-label">голды!</div>
        <div class="result-price" id="resultPrice">+0₽</div>
        
        <div class="btn-row">
            <button class="action-btn btn-save" onclick="saveToInventory()">📦 Отложить</button>
            <button class="action-btn btn-sell" onclick="sellGold()">💵 Продать</button>
        </div>
    </div>

    <div class="chance-text">
        Шансы: 10💰 - 60%, 50💰 - 30%, 100💰 - 5%, 500💰 - 2%, 1000💰 - 1.5%, 2500💰 - 0.8%, 5000💰 - 0.5%, 10000💰 - 0.2%
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Переменная для хранения данных для отправки
        let pendingData = null;

        // Настраиваем главную кнопку
        tg.MainButton.setText('Закрыть');
        tg.MainButton.onClick(() => {
            if (pendingData) {
                tg.sendData(pendingData);
            }
            tg.close();
        });
        tg.MainButton.show();

        // Также показываем кнопку "Назад" в заголовке
        tg.BackButton.onClick(() => {
            if (pendingData) {
                tg.sendData(pendingData);
            }
            tg.close();
        });
        tg.BackButton.show();

        // Призы и их шансы
        const rewards = [
            { amount: 10, chance: 6000, class: 'common' },
            { amount: 50, chance: 3000, class: 'bronze' },
            { amount: 100, chance: 500, class: 'bronze' },
            { amount: 500, chance: 200, class: 'silver' },
            { amount: 1000, chance: 150, class: 'silver' },
            { amount: 2500, chance: 80, class: 'gold' },
            { amount: 5000, chance: 50, class: 'gold' },
            { amount: 10000, chance: 20, class: 'gold' }
        ];

        const sellPrices = {
            10: 49, 50: 89, 100: 199, 500: 399, 1000: 699,
            2500: 1299, 5000: 1999, 10000: 3999
        };

        let isSpinning = false;

        // Инициализация
        function init() {
            const drum = document.getElementById('drum');
            drum.innerHTML = '';
            
            // Показываем 15 случайных призов
            for (let i = 0; i < 15; i++) {
                const r = rewards[Math.floor(Math.random() * rewards.length)];
                const el = document.createElement('div');
                el.className = `prize-item ${r.class}`;
                el.textContent = `💰 ${r.amount}`;
                el.dataset.amount = r.amount;
                el.dataset.class = r.class;
                drum.appendChild(el);
            }
        }

        // Вычисление результата
        function calculateResult() {
            const total = rewards.reduce((sum, r) => sum + r.chance, 0);
            const roll = Math.random() * total;
            
            let cumulative = 0;
            for (const r of rewards) {
                cumulative += r.chance;
                if (roll < cumulative) {
                    return r;
                }
            }
            return rewards[0];
        }

        async function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            const openBtn = document.getElementById('openBtn');
            const resultBox = document.getElementById('resultBox');
            const drum = document.getElementById('drum');
            
            openBtn.disabled = true;
            resultBox.classList.remove('show');
            
            // ВЫЧИСЛЯЕМ РЕЗУЛЬТАТ ПЕРЕД АНИМАЦИЕЙ
            const result = calculateResult();
            const winAmount = result.amount;
            const winClass = result.class;
            const winPrice = sellPrices[result.amount];
            
            // Очищаем и создаём новую ленту
            drum.innerHTML = '';
            drum.style.transition = 'none';
            drum.style.transform = 'translateY(0)';
            
            // Создаём ленту: 70 случайных призов + выигрышный + 5 после
            const prizeHeight = 100;
            const totalItems = 76; // 70 + 1 + 5
            const winPosition = 70; // Позиция выигрышного приза
            
            for (let i = 0; i < totalItems; i++) {
                let r;
                if (i === winPosition) {
                    // Это выигрышный приз
                    r = { amount: winAmount, class: winClass };
                } else {
                    // Случайный приз
                    r = rewards[Math.floor(Math.random() * rewards.length)];
                }
                
                const el = document.createElement('div');
                el.className = `prize-item ${r.class}`;
                el.textContent = `💰 ${r.amount}`;
                el.dataset.amount = r.amount;
                drum.appendChild(el);
            }
            
            // Вычисляем позицию для центрирования выигрыша
            // Выигрыш на позиции winPosition, нужно чтобы он был по центру (50px)
            const containerHeight = 100;
            const targetY = winPosition * prizeHeight - containerHeight / 2 + prizeHeight / 2;
            
            // Небольшое случайное смещение (±20px)
            const randomOffset = Math.floor(Math.random() * 40) - 20;
            const finalY = targetY + randomOffset;
            
            // Запускаем анимацию
            await new Promise(r => setTimeout(r, 50));
            drum.style.transition = 'transform 4s cubic-bezier(0.15, 0.85, 0.15, 1)';
            drum.style.transform = `translateY(-${finalY}px)`;
            
            // Ждём окончания анимации
            await new Promise(r => setTimeout(r, 4000));
            
            // ЧИТАЕМ РЕЗУЛЬТАТ ИЗ DOM - призы прокрутились, центральный сейчас - выигрышный
            // Центральная линия на 50px, нужно найти какой приз там
            // Призы идут с шагом 100px, первый был сдвинут на -finalY
            // Центральный элемент = Math.round(finalY / prizeHeight)
            const centerIndex = Math.round(finalY / prizeHeight);
            const prizeElements = drum.querySelectorAll('.prize-item');
            let finalAmount = winAmount;
            
            if (prizeElements[centerIndex] && prizeElements[centerIndex].dataset.amount) {
                finalAmount = parseInt(prizeElements[centerIndex].dataset.amount);
            }
            
            // Показываем результат
            document.getElementById('resultAmount').textContent = finalAmount.toLocaleString();
            document.getElementById('resultPrice').textContent = `+${sellPrices[finalAmount]}₽ при продаже`;
            resultBox.classList.add('show');
            
            // Сохраняем для кнопок
            window.currentWinAmount = finalAmount;
            
            // Эффект свечения
            document.querySelector('.drum-container').classList.add('glow');
            setTimeout(() => {
                document.querySelector('.drum-container').classList.remove('glow');
            }, 1000);
            
            isSpinning = false;
        }

        function saveToInventory() {
            const amount = window.currentWinAmount || 50;
            pendingData = JSON.stringify({
                action: 'save_gold',
                amount: amount
            });
            tg.showAlert('Голда добавлена в инвентарь!');
            // Отправляем данные и закрываем
            tg.sendData(pendingData);
            setTimeout(() => tg.close(), 500);
        }

        function sellGold() {
            const amount = window.currentWinAmount || 50;
            const price = sellPrices[amount];
            pendingData = JSON.stringify({
                action: 'sell_gold',
                amount: amount,
                price: price
            });
            tg.showAlert(`Голда продана за ${price}₽!`);
            tg.sendData(pendingData);
            setTimeout(() => tg.close(), 500);
        }

        init();
    </script>
</body>
</html>
