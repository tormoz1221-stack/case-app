<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кейс с голдой</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 22px;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .case-box {
            background: linear-gradient(180deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            max-width: 300px;
            border: 2px solid #3a3a5a;
            margin-bottom: 15px;
        }

        .case-icon {
            font-size: 50px;
            text-align: center;
            margin-bottom: 5px;
        }

        .case-title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Барабан */
        .drum-container {
            position: relative;
            width: 100%;
            height: 100px;
            background: #0d0d1a;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #4a4a6a;
        }

        /* Центральная линия - показывает выигрышную позицию */
        .center-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            transform: translateY(-50%);
            z-index: 10;
            box-shadow: 0 0 15px #ffd700;
        }

        /* Лента с призами */
        .drum {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            will-change: transform;
        }

        .prize-item {
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            border-bottom: 1px solid #2a2a4a;
        }

        .prize-item.gold { 
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%); 
            color: #1a1a2e;
            text-shadow: 0 1px 0 rgba(255,255,255,0.3);
        }
        .prize-item.silver { 
            background: linear-gradient(135deg, #e0e0e0 0%, #b0b0b0 100%); 
            color: #1a1a2e;
        }
        .prize-item.bronze { 
            background: linear-gradient(135deg, #cd7f32 0%, #b87333 100%); 
            color: #1a1a2e;
        }
        .prize-item.common { 
            background: linear-gradient(135deg, #4a4a6a 0%, #3a3a5a 100%);
        }

        /* Градиенты по краям для плавного исчезновения */
        .drum-container::before,
        .drum-container::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 25px;
            z-index: 5;
            pointer-events: none;
        }

        .drum-container::before {
            top: 0;
            background: linear-gradient(to bottom, #0d0d1a 60%, transparent 100%);
        }

        .drum-container::after {
            bottom: 0;
            background: linear-gradient(to top, #0d0d1a 60%, transparent 100%);
        }

        .open-btn {
            background: linear-gradient(180deg, #ffd700 0%, #ffaa00 100%);
            border: none;
            border-radius: 12px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .open-btn:active {
            transform: scale(0.98);
        }

        .open-btn:disabled {
            background: #4a4a6a;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Результат */
        .result-box {
            display: none;
            text-align: center;
            margin-top: 15px;
            padding: 20px;
            background: linear-gradient(180deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 15px;
            border: 2px solid #3a3a5a;
            width: 100%;
            max-width: 300px;
        }

        .result-box.show {
            display: block;
            animation: resultPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes resultPop {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        .result-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .result-amount {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 10px 0;
        }

        .result-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .result-price {
            font-size: 20px;
            color: #4ade80;
            margin-bottom: 15px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .btn-save {
            background: linear-gradient(180deg, #6366f1 0%, #4f46e5 100%);
            color: white;
        }

        .btn-sell {
            background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }

        .chance-text {
            margin-top: 15px;
            text-align: center;
            color: #666;
            font-size: 11px;
            max-width: 300px;
        }

        /* Эффект свечения при выигрыше */
        .glow {
            animation: glow 0.5s ease-in-out;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px #ffd700; }
            50% { box-shadow: 0 0 30px #ffd700, 0 0 50px #ffaa00; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 Кейс с голдой</h1>
    </div>

    <div class="case-box">
        <div class="case-icon">🎁</div>
        <div class="case-title">Кейс с голдой</div>
        
        <div class="drum-container">
            <div class="center-line"></div>
            <div class="drum" id="drum"></div>
        </div>
    </div>

    <button class="open-btn" id="openBtn" onclick="spin()">🎰 Открыть</button>

    <div class="result-box" id="resultBox">
        <div class="result-title">ВЫПАЛО</div>
        <div class="result-amount" id="resultAmount">0</div>
        <div class="result-label">голды!</div>
        <div class="result-price" id="resultPrice">+0₽</div>
        
        <div class="btn-row">
            <button class="action-btn btn-save" onclick="saveToInventory()">📦 Отложить</button>
            <button class="action-btn btn-sell" onclick="sellGold()">💵 Продать</button>
        </div>
    </div>

    <div class="chance-text">
        Шансы: 10💰 - 60%, 50💰 - 30%, 100💰 - 5%, 500💰 - 2%, 1000💰 - 1.5%, 2500💰 - 0.8%, 5000💰 - 0.5%, 10000💰 - 0.2%
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Призы и их шансы (в процентах * 100 для точности)
        const rewards = [
            { amount: 10, chance: 6000, class: 'common' },
            { amount: 50, chance: 3000, class: 'bronze' },
            { amount: 100, chance: 500, class: 'bronze' },
            { amount: 500, chance: 200, class: 'silver' },
            { amount: 1000, chance: 150, class: 'silver' },
            { amount: 2500, chance: 80, class: 'gold' },
            { amount: 5000, chance: 50, class: 'gold' },
            { amount: 10000, chance: 20, class: 'gold' }
        ];

        const sellPrices = {
            10: 49, 50: 89, 100: 199, 500: 399, 1000: 699,
            2500: 1299, 5000: 1999, 10000: 3999
        };

        let currentResult = null;
        let isSpinning = false;

        // Инициализация - показать все призы в барабане
        function init() {
            const drum = document.getElementById('drum');
            drum.innerHTML = '';
            
            // Показываем 15 случайных призов
            for (let i = 0; i < 15; i++) {
                const r = rewards[Math.floor(Math.random() * rewards.length)];
                const el = document.createElement('div');
                el.className = `prize-item ${r.class}`;
                el.textContent = `💰 ${r.amount}`;
                drum.appendChild(el);
            }
        }

        // Вычисление результата на основе шансов
        function calculateResult() {
            const total = rewards.reduce((sum, r) => sum + r.chance, 0);
            const roll = Math.random() * total;
            
            let cumulative = 0;
            for (const r of rewards) {
                cumulative += r.chance;
                if (roll < cumulative) {
                    return r;
                }
            }
            return rewards[0];
        }

        async function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            const openBtn = document.getElementById('openBtn');
            const resultBox = document.getElementById('resultBox');
            const drum = document.getElementById('drum');
            
            openBtn.disabled = true;
            resultBox.classList.remove('show');
            
            // Вычисляем результат
            const result = calculateResult();
            currentResult = result;
            
            // Создаём ленту призов для анимации
            drum.innerHTML = '';
            
            // 8 полных оборотов + позиция выигрыша
            const itemsPerSpin = rewards.length;
            const fullSpins = 8;
            const winIndex = Math.floor(Math.random() * rewards.length) + fullSpins * itemsPerSpin;
            
            // Создаём призы для анимации
            let currentIndex = 0;
            for (let i = 0; i < winIndex; i++) {
                const r = rewards[Math.floor(Math.random() * rewards.length)];
                const el = document.createElement('div');
                el.className = `prize-item ${r.class}`;
                el.textContent = `💰 ${r.amount}`;
                drum.appendChild(el);
                currentIndex++;
            }
            
            // Добавляем выигрышный приз
            const winEl = document.createElement('div');
            winEl.className = `prize-item ${result.class}`;
            winEl.textContent = `💰 ${result.amount}`;
            drum.appendChild(winEl);
            
            // Добавляем ещё пару призов после выигрыша
            for (let i = 0; i < 3; i++) {
                const r = rewards[Math.floor(Math.random() * rewards.length)];
                const el = document.createElement('div');
                el.className = `prize-item ${r.class}`;
                el.textContent = `💰 ${r.amount}`;
                drum.appendChild(el);
            }
            
            // Вычисляем позицию для анимации
            const prizeHeight = 100; // высота каждого приза
            const containerHeight = 100;
            
            // Центрируем выигрышный приз (он последний перед добавкой)
            const targetPosition = (currentIndex - 1) * prizeHeight - containerHeight / 2 + prizeHeight / 2;
            
            // Добавляем случайное смещение для реалистичности
            const randomOffset = Math.floor(Math.random() * 30) - 15;
            const finalPosition = targetPosition + randomOffset;
            
            // Запускаем анимацию
            drum.style.transition = 'transform 5s cubic-bezier(0.1, 0.9, 0.2, 1)';
            drum.style.transform = `translateY(-${finalPosition}px)`;
            
            // Ждём окончания анимации
            await new Promise(resolve => setTimeout(resolve, 5000));
            
            // Показываем результат
            document.getElementById('resultAmount').textContent = result.amount.toLocaleString();
            document.getElementById('resultPrice').textContent = `+${sellPrices[result.amount]}₽ при продаже`;
            resultBox.classList.add('show');
            
            // Добавляем эффект свечения
            document.querySelector('.drum-container').classList.add('glow');
            setTimeout(() => {
                document.querySelector('.drum-container').classList.remove('glow');
            }, 1000);
            
            isSpinning = false;
        }

        function saveToInventory() {
            if (!currentResult) return;
            tg.showAlert('Голда добавлена в инвентарь!');
            tg.sendData(JSON.stringify({
                action: 'save_gold',
                amount: currentResult.amount
            }));
            setTimeout(() => tg.close(), 500);
        }

        function sellGold() {
            if (!currentResult) return;
            const price = sellPrices[currentResult.amount];
            tg.showAlert(`Голда продана за ${price}₽!`);
            tg.sendData(JSON.stringify({
                action: 'sell_gold',
                amount: currentResult.amount,
                price: price
            }));
            setTimeout(() => tg.close(), 500);
        }

        init();
    </script>
</body>
</html>
