<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Открытие кейса</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 14px;
            color: #aaa;
        }

        .case-display {
            background: linear-gradient(180deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
            border: 2px solid #3a3a5a;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .case-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .case-name {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .drum-container {
            position: relative;
            width: 100%;
            height: 200px;
            background: #0a0a1a;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #4a4a6a;
        }

        .drum {
            position: absolute;
            width: 100%;
            /* Start above the visible area - first item should be above container */
            top: -50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .drum-item {
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border-bottom: 1px solid #2a2a4a;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            flex-shrink: 0; /* Prevent items from shrinking */
        }

        .drum-item.gold { background: linear-gradient(90deg, #ffd700, #ffaa00); color: #1a1a2e; }
        .drum-item.silver { background: linear-gradient(90deg, #c0c0c0, #a0a0a0); color: #1a1a2e; }
        .drum-item.bronze { background: linear-gradient(90deg, #cd7f32, #b87333); color: #1a1a2e; }
        .drum-item.common { background: linear-gradient(90deg, #4a4a6a, #3a3a5a); }

        .highlight-window {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 60px;
            background: rgba(255, 215, 0, 0.2);
            border: 3px solid #ffd700;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            z-index: 10;
            pointer-events: none;
        }

        /* Show items above and below the container with fade effect */
        .drum-container::before,
        .drum-container::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 40px;
            z-index: 5;
            pointer-events: none;
        }

        .drum-container::before {
            top: 0;
            background: linear-gradient(to bottom, #1a1a2e 0%, transparent 100%);
        }

        .drum-container::after {
            bottom: 0;
            background: linear-gradient(to top, #1a1a2e 0%, transparent 100%);
        }

        .spin-button {
            background: linear-gradient(180deg, #ffd700 0%, #ffaa00 100%);
            border: none;
            border-radius: 15px;
            padding: 18px 50px;
            font-size: 20px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .spin-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        .spin-button:disabled {
            background: #4a4a6a;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        .result {
            display: none;
            text-align: center;
            margin-top: 20px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .result-amount {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .result-label {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 20px;
        }

        .result-price {
            font-size: 24px;
            color: #4ade80;
            margin-bottom: 20px;
        }

        .result-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save {
            background: linear-gradient(180deg, #6366f1 0%, #4f46e5 100%);
            color: white;
        }

        .btn-sell {
            background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }

        .btn-spin-again {
            background: linear-gradient(180deg, #ffd700 0%, #ffaa00 100%);
            color: #1a1a2e;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #3a3a5a;
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .chance-info {
            margin-top: 20px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎁 Кейс с голдой</h1>
        <p>Откройте кейс и выиграйте голду!</p>
    </div>

    <div class="case-display">
        <div class="case-icon">💰</div>
        <div class="case-name">Кейс с голдой</div>
        
        <div class="drum-container">
            <div class="highlight-window"></div>
            <div class="drum" id="drum">
                <!-- Items will be inserted here -->
            </div>
        </div>
    </div>

    <button class="spin-button" id="spinBtn" onclick="spin()">
        🎰 Открыть кейс
    </button>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 10px;">Загрузка результата...</p>
    </div>

    <div class="result" id="result">
        <div class="result-item">💎</div>
        <div class="result-amount" id="resultAmount">0</div>
        <div class="result-label">голды выиграно!</div>
        <div class="result-price" id="resultPrice">+0₽</div>
        
        <div class="result-buttons">
            <button class="btn btn-save" onclick="saveToInventory()">
                📦 Отложить
            </button>
            <button class="btn btn-sell" onclick="sellGold()">
                💵 Продать
            </button>
        </div>
        
        <div style="margin-top: 15px;">
            <button class="btn btn-spin-again" onclick="spinAgain()">
                🎁 Открыть ещё
            </button>
        </div>
    </div>

    <div class="chance-info">
        Шанс выигрыша: 10 голды - 60%, 50 - 50%, 100 - 5%, 500 - 2%, 1000 - 1%, 1500 - 0.5%, 2500 - 0.3%, 5000 - 0.2%, 10000 - 0.1%
    </div>

    <script>
        // Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Configuration
        const rewards = [
            { amount: 10, chance: 60, class: 'common' },
            { amount: 50, chance: 50, class: 'bronze' },
            { amount: 100, chance: 5, class: 'bronze' },
            { amount: 500, chance: 2, class: 'silver' },
            { amount: 1000, chance: 1, class: 'silver' },
            { amount: 1500, chance: 0.5, class: 'gold' },
            { amount: 2500, chance: 0.3, class: 'gold' },
            { amount: 5000, chance: 0.2, class: 'gold' },
            { amount: 10000, chance: 0.1, class: 'gold' }
        ];

        const sellPrices = {
            10: 49,
            50: 89,
            100: 199,
            500: 399,
            1000: 699,
            1500: 899,
            2500: 1299,
            5000: 1999,
            10000: 3999
        };

        let currentResult = null;
        let isSpinning = false;

        // Initialize drum
        function initDrum() {
            const drum = document.getElementById('drum');
            drum.innerHTML = '';
            
            // Generate drum items - first 15 are filler, middle is result placeholder
            for (let i = 0; i < 30; i++) {
                const reward = rewards[Math.floor(Math.random() * rewards.length)];
                const item = document.createElement('div');
                item.className = `drum-item ${reward.class}`;
                item.textContent = `💎 ${reward.amount}`;
                item.id = `drum-item-${i}`;
                drum.appendChild(item);
            }
        }

        // Spin the drum
        async function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('result').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            try {
                // Calculate result based on chances
                const result = calculateResult();
                currentResult = result;
                
                // Get drum element
                const drum = document.getElementById('drum');
                
                // Clear and create new items
                drum.innerHTML = '';
                drum.style.transition = 'none';
                drum.style.transform = 'translateY(0)';
                
                // Add items: winner should be at index 3 (center of visible area: 200/50 = 4th item)
                const winningIndex = 3;
                
                // Add items before winning position (filler)
                for (let i = 0; i < winningIndex; i++) {
                    const reward = rewards[Math.floor(Math.random() * rewards.length)];
                    const item = document.createElement('div');
                    item.className = `drum-item ${reward.class}`;
                    item.textContent = `💎 ${reward.amount}`;
                    drum.appendChild(item);
                }
                
                // Add winning item
                const winItem = document.createElement('div');
                winItem.className = `drum-item ${result.class}`;
                winItem.textContent = `💎 ${result.amount}`;
                winItem.id = 'winning-item';
                drum.appendChild(winItem);
                
                // Add items after winning position (filler)
                for (let i = winningIndex + 1; i < 30; i++) {
                    const reward = rewards[Math.floor(Math.random() * rewards.length)];
                    const item = document.createElement('div');
                    item.className = `drum-item ${reward.class}`;
                    item.textContent = `💎 ${reward.amount}`;
                    drum.appendChild(item);
                }
                
                // Wait for DOM to update
                await new Promise(resolve => setTimeout(resolve, 50));
                
                // Calculate scroll position
                // Container is 200px, each item is 50px. Winner is at index 3 (4th item).
                // To center winner: 3 * 50 = 150px from top, minus half container (100) = 50px offset
                // Plus extra spins for visual effect
                const itemHeight = 50;
                const extraSpins = 5 * 30 * itemHeight; // 5 full spins
                const randomOffset = Math.floor(Math.random() * 100);
                const targetPosition = winningIndex * itemHeight - 50; // Center in 200px container
                const finalPosition = targetPosition + extraSpins + randomOffset;
                
                // Apply animation
                drum.style.transition = 'transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
                drum.style.transform = `translateY(-${finalPosition}px)`;
                
                // Wait for animation to complete
                await new Promise(resolve => setTimeout(resolve, 5000));
                
                // Show result
                document.getElementById('loading').style.display = 'none';
                showResult(result);
                
            } catch (error) {
                console.error('Error:', error);
                tg.showAlert('Произошла ошибка. Попробуйте ещё раз.');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('spinBtn').disabled = false;
            }
            
            isSpinning = false;
        }

        // Calculate result based on chances
        function calculateResult() {
            const roll = Math.random() * 10000; // 0 to 10000
            let cumulative = 0;
            
            // Sort by chance ascending for correct calculation
            const sortedRewards = [...rewards].sort((a, b) => a.chance - b.chance);
            
            for (const reward of sortedRewards) {
                cumulative += reward.chance * 100;
                if (roll <= cumulative) {
                    return reward;
                }
            }
            
            // Default to lowest reward if something goes wrong
            return rewards[0];
        }

        // Show result
        function showResult(result) {
            document.getElementById('resultAmount').textContent = result.amount.toLocaleString();
            
            const price = sellPrices[result.amount] || 0;
            document.getElementById('resultPrice').textContent = `+${price}₽ при продаже`;
            
            document.getElementById('result').style.display = 'block';
        }

        // Save to inventory
        function saveToInventory() {
            if (!currentResult) return;
            
            tg.showConfirm(
                `Отложить ${currentResult.amount} голды в инвентарь?`,
                (confirmed) => {
                    if (confirmed) {
                        tg.sendData(JSON.stringify({
                            action: 'save_gold',
                            amount: currentResult.amount
                        }));
                        tg.close();
                    }
                }
            );
        }

        // Sell gold
        function sellGold() {
            if (!currentResult) return;
            
            const price = sellPrices[currentResult.amount] || 0;
            
            tg.showConfirm(
                `Продать ${currentResult.amount} голды за ${price}₽?`,
                (confirmed) => {
                    if (confirmed) {
                        tg.sendData(JSON.stringify({
                            action: 'sell_gold',
                            amount: currentResult.amount,
                            price: price
                        }));
                        tg.close();
                    }
                }
            );
        }

        // Spin again
        function spinAgain() {
            document.getElementById('result').style.display = 'none';
            document.getElementById('spinBtn').disabled = false;
            
            // Reset drum position
            const drum = document.getElementById('drum');
            drum.style.transition = 'none';
            drum.style.transform = 'translateY(0)';
            
            // Reinitialize drum with new items
            setTimeout(() => {
                initDrum();
            }, 100);
        }

        // Initialize
        initDrum();
    </script>
</body>
</html>
