<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кейс с голдой</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 22px;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .case-box {
            background: linear-gradient(180deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            max-width: 300px;
            border: 2px solid #3a3a5a;
            margin-bottom: 15px;
        }

        .case-icon {
            font-size: 50px;
            text-align: center;
            margin-bottom: 5px;
        }

        .case-title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Барабан - видимая область */
        .drum-wrapper {
            position: relative;
            width: 100%;
            height: 80px;
            background: #0d0d1a;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #4a4a6a;
        }

        /* Окно центровки - показывает какой приз в центре */
        .center-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: #ffd700;
            transform: translateY(-50%);
            z-index: 10;
            box-shadow: 0 0 10px #ffd700;
        }

        /* Лента с призами */
        .drum-strip {
            position: absolute;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .prize {
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border-bottom: 1px solid #2a2a4a;
        }

        .prize.gold { background: linear-gradient(90deg, #ffd700, #ffaa00); color: #1a1a2e; }
        .prize.silver { background: linear-gradient(90deg, #c0c0c0, #a0a0a0); color: #1a1a2e; }
        .prize.bronze { background: linear-gradient(90deg, #cd7f32, #b87333); color: #1a1a2e; }
        .prize.common { background: linear-gradient(90deg, #4a4a6a, #3a3a5a); }

        /* Градиенты сверху и снизу для плавного исчезновения */
        .drum-wrapper::before,
        .drum-wrapper::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 20px;
            z-index: 5;
            pointer-events: none;
        }

        .drum-wrapper::before {
            top: 0;
            background: linear-gradient(to bottom, #1a1a2e 0%, transparent 100%);
        }

        .drum-wrapper::after {
            bottom: 0;
            background: linear-gradient(to top, #1a1a2e 0%, transparent 100%);
        }

        .open-btn {
            background: linear-gradient(180deg, #ffd700 0%, #ffaa00 100%);
            border: none;
            border-radius: 12px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .open-btn:disabled {
            background: #4a4a6a;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Результат */
        .result-box {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .result-box.show {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .result-amount {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-label {
            font-size: 14px;
            color: #aaa;
            margin: 5px 0 15px;
        }

        .result-price {
            font-size: 20px;
            color: #4ade80;
            margin-bottom: 15px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-save {
            background: linear-gradient(180deg, #6366f1 0%, #4f46e5 100%);
            color: white;
        }

        .btn-sell {
            background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }

        .chance-text {
            margin-top: 15px;
            text-align: center;
            color: #666;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 Кейс с голдой</h1>
    </div>

    <div class="case-box">
        <div class="case-icon">🎁</div>
        <div class="case-title">Кейс с голдой</div>
        
        <div class="drum-wrapper">
            <div class="center-line"></div>
            <div class="drum-strip" id="drumStrip"></div>
        </div>
    </div>

    <button class="open-btn" id="openBtn" onclick="spin()">🎰 Открыть</button>

    <div class="result-box" id="resultBox">
        <div class="result-amount" id="resultAmount">0</div>
        <div class="result-label">голды выиграно!</div>
        <div class="result-price" id="resultPrice">+0₽</div>
        
        <div class="btn-row">
            <button class="action-btn btn-save" onclick="saveToInventory()">📦 Отложить</button>
            <button class="action-btn btn-sell" onclick="sellGold()">💵 Продать</button>
        </div>
    </div>

    <div class="chance-text">
        Шансы: 10 - 60%, 50 - 50%, 100 - 5%, 500 - 2%, 1000 - 1%, 1500 - 0.5%, 2500 - 0.3%, 5000 - 0.2%, 10000 - 0.1%
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const rewards = [
            { amount: 10, chance: 60, class: 'common' },
            { amount: 50, chance: 50, class: 'bronze' },
            { amount: 100, chance: 5, class: 'bronze' },
            { amount: 500, chance: 2, class: 'silver' },
            { amount: 1000, chance: 1, class: 'silver' },
            { amount: 1500, chance: 0.5, class: 'gold' },
            { amount: 2500, chance: 0.3, class: 'gold' },
            { amount: 5000, chance: 0.2, class: 'gold' },
            { amount: 10000, chance: 0.1, class: 'gold' }
        ];

        const sellPrices = {
            10: 49, 50: 89, 100: 199, 500: 399, 1000: 699,
            1500: 899, 2500: 1299, 5000: 1999, 10000: 3999
        };

        let currentResult = null;
        let isSpinning = false;

        // Инициализация - показать все призы
        function init() {
            const strip = document.getElementById('drumStrip');
            strip.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                const r = rewards[Math.floor(Math.random() * rewards.length)];
                const el = document.createElement('div');
                el.className = `prize ${r.class}`;
                el.textContent = `💎 ${r.amount}`;
                strip.appendChild(el);
            }
        }

        function calculateResult() {
            const roll = Math.random() * 10000;
            let cumulative = 0;
            const sorted = [...rewards].sort((a, b) => a.chance - b.chance);
            for (const r of sorted) {
                cumulative += r.chance * 100;
                if (roll <= cumulative) return r;
            }
            return rewards[0];
        }

        async function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            document.getElementById('openBtn').disabled = true;
            document.getElementById('resultBox').classList.remove('show');
            
            const result = calculateResult();
            currentResult = result;
            
            const strip = document.getElementById('drumStrip');
            strip.innerHTML = '';
            
            // Создаем ленту: несколько призов до выигрышного, выигрышный, несколько после
            const beforeCount = 12; // Сколько призов до выигрышного
            const afterCount = 15;  // Сколько призов после
            
            // Призы до выигрыша
            for (let i = 0; i < beforeCount; i++) {
                const r = rewards[Math.floor(Math.random() * rewards.length)];
                const el = document.createElement('div');
                el.className = `prize ${r.class}`;
                el.textContent = `💎 ${r.amount}`;
                strip.appendChild(el);
            }
            
            // Выигрышный приз
            const winEl = document.createElement('div');
            winEl.className = `prize ${result.class}`;
            winEl.textContent = `💎 ${result.amount}`;
            strip.appendChild(winEl);
            
            // Призы после выигрыша
            for (let i = 0; i < afterCount; i++) {
                const r = rewards[Math.floor(Math.random() * rewards.length)];
                const el = document.createElement('div');
                el.className = `prize ${r.class}`;
                el.textContent = `💎 ${r.amount}`;
                strip.appendChild(el);
            }
            
            // Вычисляем позицию для центрирования
            // Высота каждого приза = 80px
            // Выигрышный индекс = beforeCount (он будет в центре 80px контейнера при правильном смещении)
            const prizeHeight = 80;
            const containerHeight = 80;
            const winIndex = beforeCount;
            
            // Центрируем: нужно сместить так, чтобы выигрышный был по центру
            // Позиция выигрышного = winIndex * prizeHeight
            // Центр контейнера = containerHeight / 2
            // Смещение = winIndex * prizeHeight - containerHeight / 2
            const extraSpins = 4 * rewards.length * prizeHeight;
            const randomOffset = Math.floor(Math.random() * 50);
            const targetY = winIndex * prizeHeight - containerHeight / 2;
            const finalY = targetY + extraSpins + randomOffset;
            
            // Анимация
            strip.style.transition = 'transform 4s cubic-bezier(0.2, 0.8, 0.2, 1)';
            strip.style.transform = `translateY(-${finalY}px)`;
            
            // Ждем окончания анимации
            await new Promise(r => setTimeout(r, 4000));
            
            // Показать результат
            document.getElementById('resultAmount').textContent = result.amount.toLocaleString();
            document.getElementById('resultPrice').textContent = `+${sellPrices[result.amount]}₽ при продаже`;
            document.getElementById('resultBox').classList.add('show');
            
            isSpinning = false;
        }

        function saveToInventory() {
            if (!currentResult) return;
            // Показываем сообщение и закрываем
            tg.showAlert('Голда добавлена в инвентарь!');
            tg.sendData(JSON.stringify({
                action: 'save_gold',
                amount: currentResult.amount
            }));
            setTimeout(() => tg.close(), 500);
        }

        function sellGold() {
            if (!currentResult) return;
            const price = sellPrices[currentResult.amount];
            tg.showAlert(`Голда продана за ${price}₽!`);
            tg.sendData(JSON.stringify({
                action: 'sell_gold',
                amount: currentResult.amount,
                price: price
            }));
            setTimeout(() => tg.close(), 500);
        }

        init();
    </script>
</body>
</html>
